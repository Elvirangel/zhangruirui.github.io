          ? '<ul class="knowledge-panel-list" id="' + id + '" style="display:none">' +
            items.map(function(item) {
              return '<li class="knowledge-panel-item">' +
                '<span class="knowledge-item-title">' + esc(item.title || '') + '</span>' +
                (item.detail ? '<span class="knowledge-item-detail">' + esc(item.detail) + '</span>' : '') +
                (item.code_hint ? '<code class="knowledge-item-code">' + esc(item.code_hint) + '</code>' : '') +
                '</li>';
            }).join('') + '</ul>'
          : '';
        return '<div class="knowledge-panel">' + toggle + list + '</div>';
      }

      function toggleKP(id, btn) {
        var list = document.getElementById(id);
        if (!list) return;
        var open = list.style.display === 'none';
        list.style.display = open ? '' : 'none';
        var chevron = btn.querySelector('.knowledge-panel-chevron');
        if (chevron) chevron.textContent = open ? '▲' : '▼';
        btn.closest('.knowledge-panel').classList.toggle('knowledge-panel--open', open);
      }

      function sumCard(s) {
        const secs = [
          { i: "🔍", l: "Investigated", t: s.investigated },
          { i: "💡", l: "Learned", t: s.learned },
          { i: "✅", l: "Completed", t: s.completed },
          { i: "➡️", l: "Next Steps", t: s.next_steps },
        ].filter((x) => x.t);

        var strategies = jp(s.strategies_found) || [];
        var skills = jp(s.skills_found) || [];
        var facts = jp(s.fact_found) || [];
        var hasKnowledge = strategies.length > 0 || skills.length > 0 || facts.length > 0;
        var knowledgeH = hasKnowledge
          ? '<div class="knowledge-panels">' +
            knowledgePanel('s'+s.id, '🧭', 'Strategies', strategies) +
            knowledgePanel('s'+s.id, '⚡', 'Skills', skills) +
            knowledgePanel('s'+s.id, '📌', 'Facts', facts) +
            '</div>'
          : '';

        return (
          '<div class="card summary-card">' +
          '<div class="summary-card-header"><div class="summary-badge-row"><span class="summary-badge card-type">Session Summary</span><span class="summary-project-badge">' +
          esc(s.project) +
          "</span></div>" +
          (s.request
            ? '<h2 class="summary-title">' + esc(s.request) + "</h2>"
            : "") +
          "</div>" +
          '<div class="summary-sections">' +
          secs
            .map(
              (x, i) =>
                '<div class="summary-section" style="animation-delay:' +
                i * 50 +
                'ms"><div class="summary-section-header"><span class="summary-section-icon">' +
                x.i +
                '</span><h3 class="summary-section-label">' +
                x.l +
                '</h3></div><div class="summary-section-content">' +
                esc(x.t) +
                "</div></div>",
            )
            .join("") +
          "</div>" +
          knowledgeH +
          '<div class="summary-card-footer"><span class="summary-meta-id">#' +
          s.id +
          '</span><span class="summary-meta-divider">·</span><span class="summary-meta-date">' +
          fmt(s.created_at_epoch) +
          "</span>" +
          (s.phase
            ? '<span class="summary-meta-tag summary-meta-phase">' +
              esc(s.phase) +
              "</span>"
            : "") +
          (s.scope
            ? '<span class="summary-meta-tag summary-meta-scope">' +
              esc(s.scope) +
              "</span>"
            : "") +
          "</div></div>"
        );
      }

      function prmCard(p) {
        const uid = "p" + p.id,
          long = (p.prompt_text || "").length > 300;
        return (
          '<div class="card prompt-card"><div class="card-header"><div class="card-header-left"><span class="card-type">Prompt</span><span class="card-project">' +
          esc(p.project) +
          "</span></div></div>" +
          '<div id="' +
          uid +
          '" class="prompt-content-wrap' +
          (long ? " collapsed" : "") +
          '"><div class="card-section"><pre>' +
          esc(p.prompt_text) +
          "</pre></div>" +
          (long ? '<div class="prompt-fade-overlay"></div>' : "") +
          "</div>" +
          (long
            ? '<button class="expand-toggle" onclick="tp(\'' +
              uid +
              "',this)\">展开全部</button>"
            : "") +
          '<div class="card-meta"><span class="meta-date">#' +
          p.id +
          " · " +
          fmt(p.created_at_epoch) +
          "</span></div></div>"
        );
      }

      function tp(uid, btn) {
        const e = document.getElementById(uid),
          c = e.classList.toggle("collapsed");
        btn.textContent = c ? "展开全部" : "收起";
        const f = e.querySelector(".prompt-fade-overlay");
        if (f) f.style.display = c ? "" : "none";
      }

      // ===== Sessions =====
      function renderSessions() {
        const ss = filterByProject(DATA.sessions);
        document.getElementById("sessionsContent").innerHTML = ss.length
          ? ss.map(sessCard).join("")
          : '<div class="empty-state">No sessions.</div>';
      }

      function sessCard(s) {
        const uid = "ss" + s.id;
        const dur = s.completed_at_epoch
          ? Math.round((s.completed_at_epoch - s.started_at_epoch) / 60000) +
            " min"
          : "running";
        const statusCls = "session-card-" + s.status;
        const statusBadge = "session-status-" + s.status;
        const intents = jp(s.session_intents) || [];
        const both = s.session_summary && intents.length;

        let body = "";
        if (s.session_summary)
          body +=
            '<div id="' +
            uid +
            '-sum" class="card-section"><pre style="white-space:pre-wrap;max-height:250px;overflow-y:auto">' +
            esc(s.session_summary) +
            "</pre></div>";
        if (intents.length)
          body +=
            '<div id="' +
            uid +
            '-int" class="session-intents-list' +
            (both ? " hidden" : "") +
            '">' +
            intents
              .map(
                (i) =>
                  '<div class="session-intent-item">🎯 ' + esc(i) + "</div>",
              )
              .join("") +
            "</div>";

        const tabs = both
          ? '<div class="session-content-tabs"><button class="session-tab-btn active" onclick="sst(\'' +
            uid +
            "','sum',this)\">📝 摘要</button><button class=\"session-tab-btn\" onclick=\"sst('" +
            uid +
            "','int',this)\">🎯 意图</button></div>"
          : "";

        return (
          '<div class="card session-card ' +
          statusCls +
          '">' +
          '<div class="card-header"><div class="card-header-left"><span class="' +
          statusBadge +
          '">' +
          s.status +
          '</span><span class="card-project">' +
          esc(s.project) +
          "</span></div>" +
          '<div class="card-meta-right"><span class="session-duration">' +
          dur +
          '</span><span class="meta-date">' +
          fmt(s.started_at_epoch) +
          "</span></div></div>" +
          (s.session_topic
            ? '<div class="session-tags"><span class="session-topic-tag"><span class="session-topic-icon">📌</span> ' +
              esc(s.session_topic) +
              "</span></div>"
            : "") +
          tabs +
          body +
          '<div class="card-meta"><span class="meta-date">#' +
          s.id +
          " · prompts: " +
          (s.prompt_counter || 0) +
          " · " +
          (s.content_session_id || "").slice(-8) +
          "</span></div></div>"
        );
      }

      function sst(uid, tab, btn) {
        const s = document.getElementById(uid + "-sum"),
          i = document.getElementById(uid + "-int");
        if (s) s.classList.toggle("hidden", tab !== "sum");
        if (i) i.classList.toggle("hidden", tab !== "int");
        btn.parentElement
          .querySelectorAll(".session-tab-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }

      // ===== Insights =====
      let insFP = "",
        insFS = "",
        insFV = "",
        insMS = 0;
      function insFilterBar() {
        var ae = DATA.evaluations,
          pjs = [
            ...new Set(
              ae
                .map(function (e) {
                  return e.project;
                })
                .filter(Boolean),
            ),
          ].sort();
        var sss = [
          ...new Map(
            ae.map(function (e) {
              return [e.session_db_id, e];
            }),
          ).values(),
        ]
          .sort(function (a, b) {
            return b.session_db_id - a.session_db_id;
          })
          .map(function (e) {
            return {
              id: e.session_db_id,
              lb: "#" + e.session_db_id + " " + e.memory_session_id.slice(-8),
            };
          });
        return (
          '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;border-radius:8px;background:var(--color-bg-secondary);border:1px solid var(--color-border-primary)">' +
          '<select onchange="insFP=this.value;renderInsights()" style="padding:4px 8px;border-radius:4px;border:1px solid var(--color-border-primary);background:var(--color-bg-primary);color:var(--color-text-primary);font-size:12px"><option value="">\u5168\u90e8\u9879\u76ee</option>' +
          pjs
            .map(function (p) {
              return (
                '<option value="' +
                esc(p) +
                '"' +
                (insFP === p ? " selected" : "") +
                ">" +
                esc(p) +
                "</option>"
              );
            })
            .join("") +
          "</select>" +
          '<select onchange="insFS=this.value;renderInsights()" style="padding:4px 8px;border-radius:4px;border:1px solid var(--color-border-primary);background:var(--color-bg-primary);color:var(--color-text-primary);font-size:12px"><option value="">\u5168\u90e8 Session</option>' +
          sss
            .map(function (s) {
              return (
                '<option value="' +
                s.id +
                '"' +
                (insFS === String(s.id) ? " selected" : "") +
                ">" +
                esc(s.lb) +
                "</option>"
              );
            })
            .join("") +
          "</select>" +
          '<select onchange="insFV=this.value;renderInsights()" style="padding:4px 8px;border-radius:4px;border:1px solid var(--color-border-primary);background:var(--color-bg-primary);color:var(--color-text-primary);font-size:12px"><option value="">\u5168\u90e8\u4ef7\u503c</option><option value="high"' +
          (insFV === "high" ? " selected" : "") +
          '>high</option><option value="medium"' +
          (insFV === "medium" ? " selected" : "") +
          '>medium</option><option value="low"' +
          (insFV === "low" ? " selected" : "") +
          '>low</option><option value="skip"' +
          (insFV === "skip" ? " selected" : "") +
          ">skip</option></select>" +
          '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:var(--color-text-secondary)">\u6700\u4f4e\u5206:</span><input type="range" min="0" max="100" value="' +
          insMS +
          '" oninput="insMS=+this.value;document.getElementById(\'msv\').textContent=this.value" onchange="renderInsights()" style="width:100px"><span id="msv" style="font-size:12px;font-weight:600;min-width:24px;color:var(--color-text-primary)">' +
          insMS +
          "</span></div>" +
          '<div style="flex:1"></div><button class="view-mode-toggle" style="font-size:12px;padding:4px 12px" disabled>\u91cd\u65b0\u8bc4\u4f30</button></div>'
        );
      }
      function renderInsights() {
        var items = DATA.evaluations,
          fp = insFP || currentProject();
        if (fp)
          items = items.filter(function (e) {
            return e.project === fp;
          });
        if (insFS)
          items = items.filter(function (e) {
            return String(e.session_db_id) === insFS;
          });
        if (insFV)
          items = items.filter(function (e) {
            return e.team_value === insFV;
          });
        if (insMS > 0)
          items = items.filter(function (e) {
            return e.score >= insMS;
          });
        var fb = insFilterBar();
        if (!items.length) {
          document.getElementById("insightsContent").innerHTML =
            fb +
            '<div class="empty-state">\u6682\u65e0\u8bc4\u4f30\u6570\u636e\u3002</div>';
          return;
        }
        const items2 = items;
        if (!items.length) {
          document.getElementById("insightsContent").innerHTML =
            '<div class="empty-state">No evaluations.</div>';
          return;
        }
        const gm = new Map();
        items2.forEach((ev) => {
          if (!gm.has(ev.session_db_id))
            gm.set(ev.session_db_id, {
              id: ev.session_db_id,
              mid: ev.memory_session_id,
              project: ev.project,
              sa: ev.session_started_at || null,
              evs: [],
            });
          gm.get(ev.session_db_id).evs.push(ev);
        });
        const gs = Array.from(gm.values()).sort((a, b) => b.id - a.id);
        document.getElementById("insightsContent").innerHTML =
          fb +
          gs
            .map((g) => {
              const sh = g.mid.slice(-8),
                ds = g.sa ? fmt(new Date(g.sa).getTime()) : "";
              return (
                '<div style="margin-bottom:28px"><div class="insight-session-header">' +
                '<span class="insight-session-id">Session #' +
                g.id +
                "</span>" +
                '<span class="insight-session-hash">' +
                sh +
                "</span>" +
                (ds
                  ? '<span class="insight-session-date">' + ds + "</span>"
                  : "") +
                '<span class="card-type" style="font-size:10px;border-radius:12px;padding:2px 10px">' +
                esc(g.project) +
                "</span>" +
                '<span class="insight-session-count">' +
                g.evs.length +
                " 条评估</span></div>" +
                g.evs.map(insCard).join("") +
                "</div>"
              );
            })
            .join("");
      }

      function insCard(ev) {
        var color = scoreColor(ev.score),
          circ = 2 * Math.PI * 26,
          off = circ - (ev.score / 100) * circ;
        var dims = [
          { l: "reusability", v: ev.reusability, c: "#3b82f6" },
          { l: "specificity", v: ev.specificity, c: "#8b5cf6" },
          { l: "scarcity", v: ev.scarcity, c: "#f59e0b" },
          { l: "uniqueness", v: ev.uniqueness, c: "#10b981" },
        ];
        var dh = dims
          .map(function (d) {
            var pct = d.v != null ? Math.min(100, (d.v / 25) * 100) : 0;
            return (
              '<div style="display:flex;align-items:center;gap:8px;min-width:0"><span style="font-size:11px;color:var(--color-text-secondary,#6b7280);font-weight:500;width:72px;flex-shrink:0">' +
              d.l +
              '</span><div style="flex:1;height:5px;border-radius:3px;background:var(--color-border-primary,#e5e7eb);overflow:hidden;min-width:40px"><div style="height:100%;width:' +
              pct +
              "%;border-radius:3px;background:" +
              d.c +
              '"></div></div><span style="font-size:11px;font-weight:600;width:20px;text-align:right;flex-shrink:0">' +
              (d.v != null ? d.v : "\u2013") +
              "</span></div>"
            );
          })
          .join("");

        // team_value style
        var tvs = {
          high: { bg: "#ecfdf5", color: "#065f46", border: "#a7f3d0" },
          medium: { bg: "#fefce8", color: "#713f12", border: "#fde68a" },
          low: { bg: "#fff7ed", color: "#7c2d12", border: "#fed7aa" },
          skip: { bg: "#f9fafb", color: "#6b7280", border: "#e5e7eb" },
        }[ev.team_value] || {
          bg: "#f9fafb",
          color: "#6b7280",
          border: "#e5e7eb",
        };
        var tvLabel = (ev.team_value || "skip").toUpperCase();

        return (
          '<div class="card" style="margin-bottom:12px;padding:20px 24px">' +
          // Header: tags left, actions right
          '<div class="card-header" style="margin-bottom:16px;align-items:center">' +
          '<div class="card-header-left" style="display:flex;align-items:center;gap:8px">' +
          '<span style="padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;background:' +
          tvs.bg +
          ";color:" +
          tvs.color +
          ";border:1px solid " +
          tvs.border +
          ';letter-spacing:0.06em;line-height:16px">' +
          tvLabel +
          "</span>" +
          (ev.suggest_concept
            ? '<span class="card-type" style="font-size:10px;border-radius:12px;padding:2px 10px">' +
              esc(ev.suggest_concept) +
              "</span>"
            : "") +
          '<span class="card-type" style="font-size:10px;border-radius:12px;padding:2px 10px">' +
          esc(ev.target_type) +
          "</span>" +
          "</div>" +
          '<div style="display:flex;gap:8px;align-items:center">' +
          (ev.kis_file_path
            ? '<span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;color:#065f46;background:#ecfdf5;border:1px solid #a7f3d0">\u5df2\u5199\u5165Evo</span>'
            : '<span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;color:var(--color-text-tertiary,#9ca3af);background:var(--color-bg-secondary,#f9fafb);border:1px solid var(--color-border-primary,#e5e7eb)">\u5f85\u5199\u5165</span>') +
          '<button class="view-mode-toggle" style="font-size:11px;padding:3px 10px;border-radius:6px" disabled>\u7f16\u8f91</button>' +
          '<button class="view-mode-toggle" style="font-size:11px;padding:3px 10px;border-radius:6px" disabled>\u5220\u9664</button>' +
          "</div>" +
          "</div>" +
          // Score ring + dimensions in bordered box
          '<div style="display:flex;gap:16px;align-items:center;margin-bottom:4px;padding:12px 16px;border-radius:10px;border:1px solid var(--color-border-primary,#e5e7eb)">' +
          '<div style="position:relative;width:56px;height:56px;flex-shrink:0">' +
          '<svg width="56" height="56" style="transform:rotate(-90deg)"><circle cx="28" cy="28" r="23" fill="none" stroke="var(--color-border-primary,#e5e7eb)" stroke-width="5"/><circle cx="28" cy="28" r="23" fill="none" stroke="' +
          color +
          '" stroke-width="5" stroke-dasharray="' +
          circ +
          '" stroke-dashoffset="' +
          off +
          '" stroke-linecap="round"/></svg>' +
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--color-text-primary,#111827)">' +
          ev.score +
          "</div>" +
          "</div>" +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;flex:1;min-width:0;max-width:380px">' +
          dh +
          "</div>" +
          "</div>" +
          // Title
          '<h3 style="margin-top:16px;margin-bottom:8px;font-size:16px;font-weight:600;color:var(--color-text-title,#111827);line-height:1.4;letter-spacing:-0.01em">' +
          esc(ev.title) +
          "</h3>" +
          // Content
          '<div style="font-size:14px;line-height:1.7;color:var(--color-text-primary,#374151);white-space:pre-wrap">' +
          esc(ev.content_refined) +
          "</div>" +
          // Reason
          (ev.reason
            ? '<div style="margin-top:12px;padding:10px 14px;border-radius:8px;background:var(--color-bg-card,#fff);font-size:13px;color:var(--color-text-secondary,#6b7280);border:1px solid var(--color-border-primary,#e5e7eb);border-left:3px solid var(--color-accent-primary,#3b82f6);line-height:1.6"><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-tertiary,#9ca3af);display:block;margin-bottom:4px">\u8bc4\u4f30\u539f\u56e0</span>' +
              esc(ev.reason) +
              "</div>"
            : "") +
          // Footer
          '<div class="card-meta" style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">' +
          '<span style="font-size:11px;color:var(--color-text-tertiary,#9ca3af)">#' +
          ev.id +
          " \u2192 target #" +
          ev.target_id +
          "</span>" +
          (ev.kis_file_path
            ? '<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-tertiary,#9ca3af);font-family:monospace;background:var(--color-bg-secondary);padding:2px 8px;border-radius:4px;border:1px solid var(--color-border-primary,#e5e7eb);max-width:100%;overflow:hidden"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left" title="' +
              esc(ev.kis_file_path) +
              '">' +
              esc(ev.kis_file_path) +
              '</span><span style="font-weight:500;flex-shrink:0;cursor:default">\u590d\u5236</span></span>'
            : "") +
          "</div>" +
          "</div>"
        );
      }

      // ===== Project filter + main =====
      function updatePF(pjs) {
        var s = document.getElementById("projectFilter"),
          cv = s.value;
        s.innerHTML =
          '<option value="">All Projects</option>' +
          [...pjs]
            .sort()
            .map(function (p) {
              return (
                '<option value="' +
                esc(p) +
                '"' +
                (p === cv ? " selected" : "") +
                ">" +
                esc(p) +
                "</option>"
              );
            })
            .join("");
      }
      function rerender() {
        if (currentTab === "feed") renderFeed();
        else if (currentTab === "sessions") renderSessions();
        else renderInsights();
      }
      populateProjects();
      renderStats();
      renderFeed();
    </script>
  </body>
</html>
